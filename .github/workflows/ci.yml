# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: ci-test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

# Eloc_Auth_Service

  test-auth:
    name: Test Auth Service
    runs-on: ubuntu-latest

    steps:
    - name: Set up Go 1.x
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'
      id: go

    - name: Check out code into Go module directory
      uses: actions/setup-go@v4

    - name: Test
      run: make test

  # Eloc_Product_Service

  test-product:
    name: Test Product Service
    runs-on: ubuntu-latest

    steps:
    - name: Set up Go 1.x
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'
      id: go

    - name: Check out code into Go module directory
      uses: actions/setup-go@v4

    - name: Test
      run: make test


  # Eloc_Order_Service

  test-order:
    name: Test Order Service
    runs-on: ubuntu-latest

    steps:
    - name: Set up Go 1.x
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'
      id: go

    - name: Check out code into Go module directory
      uses: actions/setup-go@v4

    - name: Test
      run: make test
