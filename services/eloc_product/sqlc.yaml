version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migration/"
    queries: "db/query/"
    gen:
      go:
        package: "db"
        out: "db/sqlc/"
        sql_package: "database/sql"
        overrides:
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"

        query_parameter_limit: 0
        
